<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scratch & Win!</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Baloo+2:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d1a;
      font-family: 'Baloo 2', cursive;
      padding: 1rem;
    }

    .page { display: none; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
    .page.active { display: flex; }

    .card-wrap {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 28px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .card-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 20%, rgba(255,215,0,0.07) 0%, transparent 55%);
      pointer-events: none;
    }

    .game-title {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.45);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .game-heading {
      font-family: 'Nunito', sans-serif;
      font-size: 28px;
      font-weight: 900;
      color: #FFD700;
      margin: 0 0 1.75rem;
      text-shadow: 0 0 24px rgba(255,215,0,0.3);
    }

    .scratch-area {
      position: relative;
      width: 270px;
      height: 270px;
      margin: 0 auto 1.5rem;
      border-radius: 18px;
      overflow: hidden;
      cursor: crosshair;
      touch-action: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .prize-reveal {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f3460, #16213e);
      gap: 8px;
    }
    .prize-emoji { font-size: 72px; line-height: 1; }
    .prize-label {
      font-family: 'Nunito', sans-serif;
      font-size: 18px;
      font-weight: 900;
      color: #FFD700;
    }
    .prize-amount {
      font-family: 'Nunito', sans-serif;
      font-size: 30px;
      font-weight: 900;
      color: #fff;
    }
    .scratch-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #C8C8C8, #A0A0A0, #D8D8D8, #B0B0B0);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: #666;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    .scratch-canvas { position: absolute; inset: 0; }

    .hint {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 0;
    }

    .btn-claim {
      font-family: 'Nunito', sans-serif;
      font-size: 16px;
      font-weight: 900;
      background: linear-gradient(135deg, #FFD700, #FFA500);
      color: #1a1a2e;
      border: none;
      border-radius: 50px;
      padding: 14px 44px;
      cursor: pointer;
      display: none;
      margin-top: 1.25rem;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 24px rgba(255,215,0,0.4);
    }
    .btn-claim:hover { transform: scale(1.04); box-shadow: 0 6px 32px rgba(255,165,0,0.6); }
    .btn-claim.visible { display: inline-block; }

    /* Won page */
    .won-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 28px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      position: relative;
      overflow: hidden;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .confetti-wrap { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
    .dot {
      position: absolute;
      border-radius: 50%;
      animation: fall linear forwards;
      opacity: 0;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
      100% { transform: translateY(520px) rotate(720deg); opacity: 0; }
    }

    .won-emoji {
      font-size: 84px;
      display: block;
      margin-bottom: 0.5rem;
      animation: bounce 0.7s ease infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-12px); }
    }
    .won-title {
      font-family: 'Nunito', sans-serif;
      font-size: 34px;
      font-weight: 900;
      color: #FFD700;
      text-shadow: 0 0 24px rgba(255,215,0,0.35);
      margin-bottom: 0.25rem;
    }
    .won-sub {
      font-size: 14px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 1.75rem;
    }
    .prize-box {
      background: rgba(255,215,0,0.08);
      border: 1.5px solid rgba(255,215,0,0.28);
      border-radius: 18px;
      padding: 1.25rem 2rem;
      margin-bottom: 1.75rem;
    }
    .prize-name {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .prize-val {
      font-family: 'Nunito', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #FFD700;
      line-height: 1;
      margin-bottom: 4px;
    }
    .prize-type {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
    }
    .btn-play-again {
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      background: transparent;
      color: rgba(255,255,255,0.45);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 10px 32px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .btn-play-again:hover { color: #fff; border-color: rgba(255,255,255,0.5); }
  </style>
</head>
<body>

  <!-- Page 1: Scratch Card -->
  <div id="page1" class="page active">
    <div class="card-wrap">
      <p class="game-title">Lucky Scratch</p>
      <h1 class="game-heading">Scratch &amp; Win!</h1>
      <div class="scratch-area" id="scratchArea">
        <div class="prize-reveal">
          <div class="prize-emoji">🎮</div>
          <div class="prize-label">You Won!</div>
          <div class="prize-amount">₹5,000</div>
        </div>
        <div class="scratch-bg" id="scratchBg">
          <span style="font-size:36px;">🪙</span>
          <span>Scratch here</span>
        </div>
        <canvas class="scratch-canvas" id="scratchCanvas"></canvas>
      </div>
      <p class="hint" id="hintText">Use your finger or mouse to scratch</p>
      <button class="btn-claim" id="claimBtn" onclick="showWon()">🎉 Claim Your Prize</button>
    </div>
  </div>

  <!-- Page 2: Prize Won -->
  <div id="page2" class="page">
    <div class="won-card">
      <div class="confetti-wrap" id="confettiWrap"></div>
      <span class="won-emoji">🏆</span>
      <h1 class="won-title">Congratulations!</h1>
      <p class="won-sub">You revealed the grand prize</p>
      <div class="prize-box">
        <p class="prize-name">Your Reward</p>
        <p class="prize-val">₹5,000</p>
        <p class="prize-type">Gaming Credits</p>
      </div>
      <button class="btn-play-again" onclick="resetGame()">↩ Play Again</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('scratchCanvas');
    const ctx = canvas.getContext('2d');
    const area = document.getElementById('scratchArea');
    let isDrawing = false;
    let revealed = false;
    const COLS = ['#FFD700','#FF6B6B','#4ECDC4','#A8E6CF','#FFE66D','#FF8B94','#C9B1FF'];

    function initCanvas() {
      const size = area.offsetWidth;
      canvas.width = size;
      canvas.height = size;
      ctx.fillStyle = '#BEBEBE';
      ctx.fillRect(0, 0, size, size);
      for (let i = 0; i < 80; i++) {
        ctx.beginPath();
        ctx.arc(Math.random() * size, Math.random() * size, Math.random() * 3 + 1, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fill();
      }
    }

    function scratch(x, y) {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(x, y, 30, 0, Math.PI * 2);
      ctx.fill();
      checkProgress();
    }

    function getPos(e) {
      const r = canvas.getBoundingClientRect();
      if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
      return { x: e.clientX - r.left, y: e.clientY - r.top };
    }

    function checkProgress() {
      if (revealed) return;
      const d = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      let transparent = 0;
      for (let i = 3; i < d.length; i += 4) if (d[i] < 128) transparent++;
      const pct = (transparent / (canvas.width * canvas.height)) * 100;
      if (pct > 40) {
        revealed = true;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('hintText').textContent = '🎉 You found the prize!';
        document.getElementById('claimBtn').classList.add('visible');
      }
    }

    canvas.addEventListener('mousedown', e => { isDrawing = true; scratch(getPos(e).x, getPos(e).y); });
    canvas.addEventListener('mousemove', e => { if (isDrawing) scratch(getPos(e).x, getPos(e).y); });
    canvas.addEventListener('mouseup',   () => isDrawing = false);
    canvas.addEventListener('mouseleave',() => isDrawing = false);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true;  scratch(getPos(e).x, getPos(e).y); }, { passive: false });
    canvas.addEventListener('touchmove',  e => { e.preventDefault(); if (isDrawing) scratch(getPos(e).x, getPos(e).y); }, { passive: false });
    canvas.addEventListener('touchend',   () => isDrawing = false);

    function showWon() {
      document.getElementById('page1').classList.remove('active');
      document.getElementById('page2').classList.add('active');
      launchConfetti();
    }

    function launchConfetti() {
      const wrap = document.getElementById('confettiWrap');
      wrap.innerHTML = '';
      for (let i = 0; i < 50; i++) {
        const d = document.createElement('div');
        d.className = 'dot';
        const size = 6 + Math.random() * 7;
        d.style.cssText = `
          left: ${Math.random() * 100}%;
          top: -20px;
          width: ${size}px;
          height: ${size}px;
          background: ${COLS[Math.floor(Math.random() * COLS.length)]};
          animation-duration: ${1.6 + Math.random() * 2}s;
          animation-delay: ${Math.random() * 1.4}s;
        `;
        wrap.appendChild(d);
      }
      setTimeout(launchConfetti, 3400);
    }

    function resetGame() {
      document.getElementById('page2').classList.remove('active');
      document.getElementById('page1').classList.add('active');
      revealed = false;
      document.getElementById('hintText').textContent = 'Use your finger or mouse to scratch';
      document.getElementById('claimBtn').classList.remove('visible');
      initCanvas();
    }

    initCanvas();
  </script>
</body>
</html>
